# Deploy go_backend to Azure Container Apps (ACR push + revision update).
# Repo: https://github.com/JMSolorzano-13/go_backend
#
# **Tenant DB schemas:** Embedded SQL in `go_backend/internal/db/tenant_schema/tenant_tables.sql`
# (regenerate via `go_backend/scripts/regenerate_tenant_tables_sql.sh` when Alembic tenant head changes).
#
# Secret: AZURE_CREDENTIALS — JSON from `az ad sp create-for-rbac --sdk-auth` (clientId, clientSecret, subscriptionId, tenantId, …).
# Repository variables (Settings → Secrets and variables → Actions → Variables):
#   AZURE_RESOURCE_GROUP, AZURE_ACR_NAME (registry name only, e.g. myregistry), AZURE_CONTAINER_APP_NAME
#   AZURE_WORKER_CONTAINER_APP_NAME — optional; SAT Service Bus worker (`go-worker` image). If unset, worker image is still pushed but ACA is not updated.

name: Deploy Azure (ACA)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (empty = short SHA)"
        required: false
        default: ""
      docker_target:
        description: "Dockerfile target (prod | dev)"
        required: false
        default: "prod"
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"

permissions:
  contents: read

env:
  IMAGE_NAME: go-backend
  IMAGE_NAME_WORKER: go-worker

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Actions variables (ACR / RG / Container App)
        run: |
          missing=""
          [ -z "${{ vars.AZURE_ACR_NAME }}" ] && missing="${missing}AZURE_ACR_NAME "
          [ -z "${{ vars.AZURE_RESOURCE_GROUP }}" ] && missing="${missing}AZURE_RESOURCE_GROUP "
          [ -z "${{ vars.AZURE_CONTAINER_APP_NAME }}" ] && missing="${missing}AZURE_CONTAINER_APP_NAME "
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub Actions repository variables: $missing"
            echo "::notice::Add them under Settings → Secrets and variables → Actions → Variables (not Secrets). Values: terraform output -json registry / resource_group_name / compute (container app name)."
            exit 1
          fi

      - name: Derive image tag
        id: tag
        run: |
          IT="${{ github.event.inputs.image_tag }}"
          if [ -n "$IT" ]; then
            echo "value=$IT" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: ACR login
        run: az acr login --name "${{ vars.AZURE_ACR_NAME }}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ github.event.inputs.docker_target || 'prod' }}
          push: true
          tags: |
            ${{ vars.AZURE_ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
            ${{ vars.AZURE_ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image (prod-worker / dev-worker)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.docker_target == 'dev' && 'dev-worker' || 'prod-worker' }}
          push: true
          tags: |
            ${{ vars.AZURE_ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME_WORKER }}:${{ steps.tag.outputs.value }}
            ${{ vars.AZURE_ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME_WORKER }}:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update API Container App
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ vars.AZURE_ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}" \
            --output none

      - name: Update SAT worker Container App
        if: ${{ vars.AZURE_WORKER_CONTAINER_APP_NAME != '' }}
        run: |
          az containerapp update \
            --name "${{ vars.AZURE_WORKER_CONTAINER_APP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --image "${{ vars.AZURE_ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME_WORKER }}:${{ steps.tag.outputs.value }}" \
            --output none
